; ── OPcache ─────────────────────────────────────────────────────────────────
; Pre-compiles PHP files at startup so subsequent requests skip parsing.
; Critical for Cloud Run cold-start performance.
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
; In production the source never changes at runtime, so disable revalidation.
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1

; ── Memory & timeouts ────────────────────────────────────────────────────────
memory_limit=128M
max_execution_time=30
max_input_time=30

; ── Upload limits ────────────────────────────────────────────────────────────
upload_max_filesize=20M
post_max_size=20M

; ── Error handling ───────────────────────────────────────────────────────────
; Errors go to stderr → Cloud Logging, never to the browser in production.
display_errors=Off
display_startup_errors=Off
log_errors=On
error_log=/dev/stderr

; ── Miscellaneous ────────────────────────────────────────────────────────────
date.timezone=UTC
