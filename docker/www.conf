; PHP-FPM pool tuned for Cloud Run (256 MB container, low-traffic inventory app)

[www]
user  = www-data
group = www-data

; TCP loopback — avoids Unix socket permission/timing issues in containers
listen = 127.0.0.1:9000

; ondemand: workers only spawn when a request arrives.
; Ideal for scale-to-zero — no idle memory wasted between requests.
pm                      = ondemand
pm.max_children         = 10
pm.process_idle_timeout = 10s
pm.max_requests         = 500

; Surface php-fpm stdout/stderr to Docker/Cloud Logging
catch_workers_output        = yes
decorate_workers_output     = no
php_admin_value[error_log]  = /dev/stderr
php_admin_flag[log_errors]  = on
