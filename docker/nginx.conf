user  www-data;
worker_processes  auto;

# Send logs to stdout/stderr so Cloud Logging picks them up
error_log  /dev/stderr warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Compact log format — goes to Cloud Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Gzip — reduces bandwidth, speeds up Inertia/React asset delivery
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        application/javascript
        application/json
        application/x-font-ttf
        font/opentype
        image/svg+xml
        text/css
        text/plain
        text/xml;

    server {
        # Cloud Run injects $PORT (default 8080); we hardcode 8080 here
        listen 8080 default_server;
        server_name _;

        root /var/www/html/public;
        index index.php;

        # Vite-built assets: long cache + immutable
        location ~* ^/build/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Static public files: moderate caching
        location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # Main Laravel entry-point
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP via FastCGI → PHP-FPM unix socket
        location ~ \.php$ {
            fastcgi_pass  unix:/var/run/php-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include       fastcgi_params;

            # Forward real client IP from Cloud Run load balancer
            fastcgi_param  HTTP_X_FORWARDED_FOR  $http_x_forwarded_for;
            fastcgi_param  HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;

            fastcgi_read_timeout 60;
        }

        # Deny access to hidden files (.env, .git, etc.)
        location ~ /\. {
            deny all;
        }
    }
}
